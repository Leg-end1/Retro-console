name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run checks on every push and PR ──────────────────────────────────
  ci:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Validate server.js syntax
        run: node --check server.js

      - name: Check all HTML files parse
        run: |
          for f in public/*.html; do
            echo "Checking $f..."
            node -e "
              const fs = require('fs');
              const html = fs.readFileSync('$f', 'utf8');
              // Extract inline scripts and validate syntax
              const scripts = html.match(/<script(?![^>]*src)[^>]*>([\s\S]*?)<\/script>/g) || [];
              scripts.forEach((s, i) => {
                const code = s.replace(/<\/?script[^>]*>/g, '');
                try { new Function(code); }
                catch(e) { console.error('Syntax error in $f script #' + (i+1) + ':', e.message); process.exit(1); }
              });
              console.log('  OK');
            "
          done

      - name: Verify games directory exists
        run: test -d public/games || mkdir -p public/games

  # ── Job 2: Deploy to Railway (only on push to main, not PRs) ───────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}